# =============================================================================
# Docker Compose Override für zusätzliche Services
# =============================================================================
# Diese Datei erweitert die Standard Supabase docker-compose.yml um:
# - Caddy (Reverse Proxy & SSL Termination)
# - Portainer (Container Management)
# - docker-volume-backup (Automatische Backups)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Storage Override - S3/R2 Backend statt lokales Dateisystem
  # ---------------------------------------------------------------------------
  # Die Standard docker-compose.yml setzt STORAGE_BACKEND=file hardcoded.
  # Dieser Override aktiviert S3 (Cloudflare R2) als Storage-Backend.
  # ---------------------------------------------------------------------------
  storage:
    environment:
      STORAGE_BACKEND: s3
      GLOBAL_S3_BUCKET: "${S3_STORAGE_BUCKET}"
      GLOBAL_S3_ENDPOINT: "${S3_ENDPOINT}"
      GLOBAL_S3_PROTOCOL: https
      GLOBAL_S3_FORCE_PATH_STYLE: "true"
      AWS_ACCESS_KEY_ID: "${S3_ACCESS_KEY}"
      AWS_SECRET_ACCESS_KEY: "${S3_SECRET_KEY}"
      AWS_DEFAULT_REGION: "${S3_REGION}"
      REGION: "${S3_REGION}"
      # R2 unterstuetzt kein S3 Object Tagging (x-amz-tagging → 501 NotImplemented)
      TUS_ALLOW_S3_TAGS: "false"
    volumes: []

  # ---------------------------------------------------------------------------
  # Database Override - Backup Labels hinzufügen
  # ---------------------------------------------------------------------------
  db:
    labels:
      - "docker-volume-backup.archive-pre=/bin/sh -c 'pg_dumpall --clean -U postgres > /var/lib/postgresql/data/backup_dump.sql'"
      - "docker-volume-backup.archive-post=/bin/sh -c 'rm -f /var/lib/postgresql/data/backup_dump.sql'"

  # ---------------------------------------------------------------------------
  # Caddy - Reverse Proxy & SSL Termination
  # ---------------------------------------------------------------------------
  # KRITISCHER SERVICE - Muss immer laufen!
  # Caddy ist der zentrale Entry Point für alle Domains
  # ---------------------------------------------------------------------------
  caddy:
    container_name: caddy
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: "${ACME_DOMAIN}"
      ACME_EMAIL: "${ACME_EMAIL}"
    volumes:
      - /opt/supabase/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
          cpus: '0.25'
    labels:
      - "docker-volume-backup.stop-during-backup=false"
    networks:
      - default
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    stop_grace_period: 30s

  # ---------------------------------------------------------------------------
  # Portainer - Container Management UI
  # ---------------------------------------------------------------------------
  portainer:
    container_name: portainer
    image: portainer/portainer-ce:latest
    restart: unless-stopped
    command: --admin-password-file /tmp/portainer_password
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
      - /opt/supabase/portainer_password:/tmp/portainer_password:ro
    labels:
      - "docker-volume-backup.stop-during-backup=false"
    networks:
      - default

  # ---------------------------------------------------------------------------
  # docker-volume-backup - Automatische Backups zu S3
  # ---------------------------------------------------------------------------
  backup:
    container_name: backup
    image: offen/docker-volume-backup:v2
    restart: unless-stopped
    environment:
      BACKUP_CRON_EXPRESSION: "${BACKUP_CRON_EXPRESSION:-0 3 * * *}"
      BACKUP_RETENTION_DAYS: "${BACKUP_RETENTION_DAYS:-14}"
      BACKUP_COMPRESSION: "gz"
      BACKUP_FILENAME: "backup-%Y-%m-%dT%H-%M-%S.{{ .Extension }}"
      AWS_S3_BUCKET_NAME: "${S3_BACKUP_BUCKET}"
      AWS_S3_PATH: "supabase"
      AWS_ENDPOINT: "${S3_ENDPOINT_HOST}"
      AWS_ENDPOINT_PROTO: "https"
      AWS_ACCESS_KEY_ID: "${S3_ACCESS_KEY}"
      AWS_SECRET_ACCESS_KEY: "${S3_SECRET_KEY}"
      NOTIFICATION_URLS: "${NOTIFICATION_URLS:-}"
      NOTIFICATION_LEVEL: "error"
      GPG_PASSPHRASE: "${BACKUP_ENCRYPTION_KEY:-}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./volumes/db/data:/backup/db-data:ro
      - /opt/supabase/.env:/backup/config/.env:ro
    networks:
      - default

# =============================================================================
# Zusätzliche Volumes
# =============================================================================
volumes:
  portainer_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
  caddy_logs:
    driver: local
